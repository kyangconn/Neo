---
name: ✨ 功能建议
description: 提出一个新功能或改进想法
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你想要什么功能？解决什么问题？
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: 使用场景
      description: 这个功能在什么场景下会用到？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 有没有其他方式可以达到类似效果？
