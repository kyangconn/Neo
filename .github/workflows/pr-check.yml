name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Classify changed paths
        uses: dorny/paths-filter@f3ceefdc7ef57bc2d8560787d4b6c33e44044cec # v4
        id: filter
        with:
          filters: |
            frontend:
              - "apps/desktop/**"
              - "packages/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "tsconfig*.json"
              - "eslint.config.*"
              - ".github/**"
            backend:
              - "apps/desktop/src-tauri/**"
              - "rust-toolchain.toml"
              - ".github/actions/**"
              - ".github/workflows/**"

  frontend:
    name: Frontend quality
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-js

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  backend:
    name: Rust quality
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # pinned
        with:
          toolchain: "1.95.0"
          components: clippy,rustfmt

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
        working-directory: .

      # Build necessary frontend dist for rust check
      - uses: ./.github/actions/setup-js

      - name: Build dist
        run: pnpm build

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-ci-1.95.0-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ci-1.95.0-

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-targets --all-features

  ci-success:
    name: CI success
    if: always()
    needs: [changes, frontend, backend]
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    steps:
      - name: Verify required jobs
        shell: bash
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
        run: |
          for result in "$CHANGES_RESULT" "$FRONTEND_RESULT" "$BACKEND_RESULT"; do
            case "$result" in
              success|skipped) ;;
              *) echo "A required CI job ended with: $result" >&2; exit 1 ;;
            esac
          done
