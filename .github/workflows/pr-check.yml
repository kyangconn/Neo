name: PR Check

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-22.04
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - "apps/desktop/src/**"
              - "packages/**"
              - "pnpm-lock.yaml"
              - "package.json"
              - "Makefile"
            backend:
              - "apps/desktop/src-tauri/**"
              - "apps/desktop/src-tauri/Cargo.toml"
              - "apps/desktop/src-tauri/Cargo.lock"

  lint-ts:
    name: TypeScript Lint & Type Check
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: latest
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint 2>&1 || pnpm exec eslint 'apps/desktop/src/**/*.{ts,tsx}' --max-warnings=0

      - name: TypeScript check
        run: |
          pnpm --filter @neo-tavern/desktop exec tsc -b
          pnpm --filter @neo-tavern/desktop exec tsc --noEmit

  check-rust:
    name: Rust Check
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: pnpm/action-setup@v6
        with:
          version: latest
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install JS dependencies (needed for Tauri build scripts)
        run: pnpm install --frozen-lockfile

      - name: Build dist
        run: pnpm build

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-pr-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pr-
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cd apps/desktop/src-tauri && cargo check

      - name: cargo clippy
        run: cd apps/desktop/src-tauri && cargo clippy -- -D warnings

  test-js:
    name: JS Tests
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: latest
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --recursive --if-present test
