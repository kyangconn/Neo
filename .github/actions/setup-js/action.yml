name: Setup JavaScript toolchain
description: Install the pinned Node.js and pnpm toolchain with a lockfile-backed cache

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      with:
        cache: true

    - name: Install Node.js
      uses: actions/setup-node@f4a67bbeca970f103397d3d2b9462cf787cd2980 # v6
      with:
        node-version: '24.17'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
