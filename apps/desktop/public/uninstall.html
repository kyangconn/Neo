<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Tavern 卸载</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    background: #0b0c10;
    color: #e9e9ee;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
  }
  .card {
    background: #111218; border: 1px solid #262733;
    border-radius: 16px; padding: 40px; max-width: 480px; width: 100%;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  h1 { font-size: 1.4em; margin-bottom: 8px; }
  p.desc { color: #7d7f8e; font-size: 0.9em; margin-bottom: 24px; line-height: 1.6; }
  .table { text-align: left; margin-bottom: 24px; }
  .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.85em; border-bottom: 1px solid #1e1f2a; }
  .row:last-child { border: none; }
  .key { color: #7d7f8e; font-family: monospace; }
  .val { color: #a4a6b0; }
  .actions { display: flex; gap: 10px; }
  button {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-size: 0.95em; font-weight: 600; cursor: pointer;
    transition: all .15s;
  }
  .btn-danger { background: #e53e3e; color: #fff; }
  .btn-danger:hover { background: #c53030; }
  .btn-ghost { background: transparent; border: 1px solid #262733; color: #a4a6b0; }
  .btn-ghost:hover { background: #1e1f2a; color: #fff; }
  .msg { margin-top: 16px; font-size: 0.85em; border-radius: 8px; padding: 10px; display: none; }
  .msg-success { display: block; background: #1a3a2a; color: #68d391; border: 1px solid #2f6b44; }
  .msg-aborted { display: block; background: #1e1f2a; color: #a4a6b0; border: 1px solid #262733; }
  .counter { font-size: 3em; font-weight: 700; margin-bottom: 16px; color: #e53e3e; }
</style>
</head>
<body>

<script>
const NEO_PREFIX = 'neotavern_'

function countKeys() {
  let n = 0
  for (let i = 0; i < localStorage.length; i++) {
    if (localStorage.key(i).startsWith(NEO_PREFIX)) n++
  }
  return n
}

function renderStats() {
  const rows = []
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i)
    if (!k.startsWith(NEO_PREFIX)) continue
    const v = localStorage.getItem(k)
    const short = v.length > 60 ? v.slice(0, 57) + '...' : v
    rows.push({ key: k, len: v.length })
  }
  rows.sort((a,b) => a.key.localeCompare(b.key))

  document.getElementById('count').textContent = countKeys()
  document.getElementById('rows').innerHTML = rows.map(r =>
    `<div class="row"><span class="key">${r.key}</span><span class="val">${(r.len/1024).toFixed(1)} KB</span></div>`
  ).join('') || '<div class="row"><span style="color:#7d7f8e">没有找到 Neo Tavern 数据</span></div>'
}

function clearAll() {
  const n = countKeys()
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const k = localStorage.key(i)
    if (k.startsWith(NEO_PREFIX)) localStorage.removeItem(k)
  }
  document.getElementById('msg').className = 'msg msg-success'
  document.getElementById('msg').textContent = `已清除 ${n} 条数据，Neo Tavern 已卸载完毕。`
  document.getElementById('count').textContent = '0'
  document.getElementById('rows').innerHTML = '<div class="row"><span style="color:#68d391">所有数据已清除</span></div>'
  document.getElementById('btn-clear').disabled = true
  document.getElementById('btn-clear').textContent = '已完成'
}

function back() {
  document.getElementById('msg').className = 'msg msg-aborted'
  document.getElementById('msg').textContent = '操作已取消。可以关闭此页面，数据完好无损。'
}
</script>

<div class="card">
  <h1>Neo Tavern 卸载程序</h1>
  <p class="desc">
    这会删除 Neo Tavern 保存在你浏览器中的所有数据，
    包括角色、聊天记录、世界书、预设和各项设置。
    此操作<b>不可撤销</b>。
  </p>

  <div class="counter" id="count">-</div>
  <div class="table" id="rows"></div>

  <div class="actions">
    <button class="btn-ghost" onclick="back()">取消</button>
    <button class="btn-danger" id="btn-clear" onclick="clearAll()">确认卸载</button>
  </div>

  <div id="msg"></div>
</div>

<script>renderStats()</script>
</body>
</html>
